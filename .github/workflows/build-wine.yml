name: Build Wine

on:
  schedule:
    # Build staging + termux-glibc every 3 days
    - cron: '0 0 */3 * *'
  workflow_dispatch:
    inputs:
      wine_branch:
        description: 'Wine branch to build'
        type: choice
        options:
          - staging
          - vanilla
          - staging-tkg
        default: staging
      wine_version:
        description: 'Wine version (latest, git, or specific version)'
        type: string
        default: git
      target_env:
        description: 'Target environment'
        type: choice
        options:
          - termux-glibc
          - proot
        default: termux-glibc
      build_wayland:
        description: 'Build with Wayland support'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Download bootstrap
        id: download-artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: Bootstraps
          path: /opt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Fallback bootstrap download
        if: steps.download-artifact.outcome == 'failure'
        uses: dawidd6/action-download-artifact@v8
        with:
          workflow: bootstrap.yml
          workflow_conclusion: success
          name: Bootstraps
          path: /opt

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y debootstrap perl git wget xz-utils bubblewrap autoconf

      - name: Extract bootstrap
        run: |
          # Enable unprivileged user namespaces (required for bwrap on Ubuntu 24.04)
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          sudo tar -C /opt -xpf /opt/bootstraps.tar.xz

      - name: Set up ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ inputs.wine_branch || 'staging' }}-${{ inputs.build_wayland && 'wayland' || 'x11' }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ inputs.wine_branch || 'staging' }}-${{ inputs.build_wayland && 'wayland' || 'x11' }}-
            ccache-${{ inputs.wine_branch || 'staging' }}-

      - name: Configure ccache
        run: |
          mkdir -p ~/.ccache
          echo "max_size = 2G" > ~/.ccache/ccache.conf
          echo "compression = true" >> ~/.ccache/ccache.conf
          echo "compression_level = 6" >> ~/.ccache/ccache.conf

      - name: Build Wine
        run: |
          chmod +x build_wine.sh

          # Set target environment
          if [ "${{ inputs.target_env || 'termux-glibc' }}" = "termux-glibc" ]; then
            export TERMUX_GLIBC="true"
            export TERMUX_PROOT="false"
          else
            export TERMUX_GLIBC="false"
            export TERMUX_PROOT="true"
          fi

          export WINE_VERSION="${{ inputs.wine_version || 'git' }}"
          export BUILD_WAYLAND="${{ inputs.build_wayland || 'false' }}"
          export USE_CCACHE="true"

          # Restore ccache from GitHub Actions cache into BUILD_DIR
          # (bwrap mounts --tmpfs /home, so ~/.ccache is inaccessible inside sandbox)
          BUILD_DIR="${HOME}/build_wine"
          mkdir -p "${BUILD_DIR}/ccache_cache"
          cp ~/.ccache/ccache.conf "${BUILD_DIR}/ccache_cache/" 2>/dev/null || true
          if [ -d ~/.ccache ] && [ "$(ls -A ~/.ccache 2>/dev/null)" ]; then
            cp -a ~/.ccache/* "${BUILD_DIR}/ccache_cache/" 2>/dev/null || true
          fi

          WINE_BRANCH="${{ inputs.wine_branch || 'staging' }}" ./build_wine.sh

          # Save ccache back for GitHub Actions cache persistence
          mkdir -p ~/.ccache
          if [ -d "${BUILD_DIR}/ccache_cache" ] && [ "$(ls -A ${BUILD_DIR}/ccache_cache 2>/dev/null)" ]; then
            cp -a "${BUILD_DIR}/ccache_cache/"* ~/.ccache/ 2>/dev/null || true
          fi

          sha256sum *.tar.xz

      - name: Show ccache stats
        if: always()
        run: |
          if command -v ccache &>/dev/null; then
            ccache -s
          elif [ -f ~/.ccache/ccache.conf ]; then
            echo "ccache stats from build:"
            ls -lh ~/.ccache/
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: Wine-${{ inputs.wine_branch || 'staging' }}-${{ inputs.target_env || 'termux-glibc' }}${{ inputs.build_wayland && '-wayland' || '' }}
          path: ./*.tar.xz
